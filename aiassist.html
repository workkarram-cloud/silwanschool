<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدرسة ذكور سلوان الابتدائية - المساعد الذكي</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* تعيين الخطوط والخلفية المتدرجة */
body { 
  font-family: 'Segoe UI', Tahoma, sans-serif; 
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
}
/* تأثيرات بطاقة الفيديو عند التحويم */
.video-card{
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  border-radius: 20px;
  overflow: hidden;
  backdrop-filter: blur(10px);
}
.video-card:hover{
  transform: translateY(-12px) scale(1.02);
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}
/* تأثيرات زر الكلمات المفتاحية */
.keyword-btn {
  transition: all 0.3s ease;
  backdrop-filter: blur(5px);
}
.keyword-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
}
/* حركة التحميل */
.loader {
  width: 50px;
  height: 50px;
  border: 5px solid #f3f3f3;
  border-top: 5px solid #3b82f6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body class="min-h-screen p-4 md:p-12">

<header class="max-w-6xl mx-auto mb-16 p-6 bg-white/5 rounded-3xl border border-white/10 shadow-2xl backdrop-blur-lg">
  <div class="flex flex-col md:flex-row items-center justify-between gap-6">
    
    <div class="flex items-center gap-6 text-center md:text-right">
      <img src="https://lh3.googleusercontent.com/u/0/d/1Trv3aVvG-9OI1pIBM-kW0pSNBga3RhCC=w160-h160-p-k-nu" 
           alt="شعار مدرسة ذكور سلوان الابتدائية" 
           class="w-20 h-20 md:w-24 md:h-24 object-contain drop-shadow-lg">
      
      <div>
        
        <h2 class="text-white text-2xl md:text-3xl font-black mt-1">مدرسة ذكور سلوان الابتدائية</h2>
      </div>
    </div>
    
    <div class="border-t-2 md:border-t-0 md:border-r-2 border-white/10 pt-4 md:pt-0 md:pr-6 text-center md:text-right">
      <h1 class="text-5xl md:text-6xl font-black bg-gradient-to-r from-blue-400 via-purple-500 to-pink-500 bg-clip-text text-transparent drop-shadow-2xl">
        المساعد الذكي
      </h1>
    </div>
  </div>
</header>

<div class="max-w-4xl mx-auto mb-16">
  <div class="flex flex-col lg:flex-row gap-4 max-w-2xl mx-auto mb-8">
    <input id="search-input" 
           placeholder="🔍 ابحث عن دروس (الرياضيات، البرمجة، العلوم...)" 
           class="flex-1 p-4 lg:p-6 rounded-3xl border-2 border-white/20 bg-white/10 backdrop-blur-xl text-white placeholder-white/70 text-xl focus:outline-none focus:border-blue-400 focus:bg-white/20 transition-all shadow-xl">
    <button onclick="searchVideos()" 
            class="bg-gradient-to-r from-blue-600 to-purple-700 hover:from-blue-700 hover:to-purple-800 text-white px-8 py-4 lg:py-6 rounded-3xl font-bold text-lg lg:text-xl shadow-2xl hover:shadow-3xl transform hover:scale-105 transition-all whitespace-nowrap">
      ابحث الآن
    </button>
  </div>
  
  <div class="bg-white/5 p-6 rounded-3xl border border-white/10 text-center">
    <p class="text-white/70 text-lg mb-4 font-semibold">أو جرب البحث السريع عن موضوعات شائعة:</p>
    <div class="flex flex-wrap gap-3 justify-center">
      <button onclick="searchWithKeyword('رياضيات')" class="keyword-btn bg-white/10 text-blue-300 hover:bg-blue-600 hover:text-white px-5 py-3 rounded-full font-bold text-lg border border-blue-500/30">🔢 رياضيات</button>
      <button onclick="searchWithKeyword('علوم الصف الثالث')" class="keyword-btn bg-white/10 text-emerald-300 hover:bg-emerald-600 hover:text-white px-5 py-3 rounded-full font-bold text-lg border border-emerald-500/30">🔬 علوم</button>
      <button onclick="searchWithKeyword('لغة عربية للاطفال')" class="keyword-btn bg-white/10 text-amber-300 hover:bg-amber-600 hover:text-white px-5 py-3 rounded-full font-bold text-lg border border-amber-500/30">📖 لغة عربية</button>
      <button onclick="searchWithKeyword('انجليزي مبتدئين')" class="keyword-btn bg-white/10 text-red-300 hover:bg-red-600 hover:text-white px-5 py-3 rounded-full font-bold text-lg border border-red-500/30">🇬🇧 انجليزي</button>
      <button onclick="searchWithKeyword('برمجة للمبتدئين')" class="keyword-btn bg-white/10 text-purple-300 hover:bg-purple-600 hover:text-white px-5 py-3 rounded-full font-bold text-lg border border-purple-500/30">💻 برمجة</button>
      <button onclick="searchWithKeyword('تاريخ ')" class="keyword-btn bg-white/10 text-sky-300 hover:bg-sky-600 hover:text-white px-5 py-3 rounded-full font-bold text-lg border border-sky-500/30">🗺️ تاريخ</button>
    </div>
  </div>
</div>

<div id="videos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto"></div>

<div id="modal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[9999] hidden flex items-center justify-center p-4 md:p-8">
  <div class="w-full max-w-6xl max-h-[95vh] bg-white/95 backdrop-blur-2xl rounded-3xl shadow-2xl overflow-hidden border-4 border-white/20 flex flex-col">
    
    <div class="bg-gradient-to-r from-indigo-600 to-purple-700 text-white p-6 md:p-8 flex justify-between items-center shrink-0">
      <div>
        <h2 class="text-2xl md:text-3xl font-black mb-1">🎥 استعداد للتشغيل</h2>
        <p id="video-title" class="text-lg md:text-xl opacity-90 font-semibold"></p>
      </div>
      <button onclick="closeModal()" 
              class="w-12 h-12 md:w-14 md:h-14 bg-white/20 hover:bg-white/40 rounded-2xl flex items-center justify-center text-2xl font-bold hover:scale-110 transition-all shadow-lg ml-4">
        ✕
      </button>
    </div>
    
    <div class="p-6 md:p-8 lg:p-12 overflow-y-auto">
      <div id="video-player" class="w-full max-w-4xl mx-auto">
        </div>
    </div>
  </div>
</div>

<script>
// 🔥 YOUR API KEY HERE
const API_KEY = "AIzaSyBmga9XQn28avlLVldC7TY4Od2FsRGptGs"; // تأكد من وضع مفتاح API الخاص بك هنا!

let currentVideoId = null;

// New Function to handle keyword clicks (Newly Engineered)
function searchWithKeyword(keyword) {
  // Set the value of the search input
  document.getElementById('search-input').value = keyword;
  // Trigger the search
  searchVideos();
}

async function searchVideos() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) {
    alert('اكتب كلمة للبحث أو اختر من الموضوعات المقترحة');
    return;
  }
  
  if (!API_KEY || API_KEY === "YOUR_YOUTUBE_API_KEY") {
    alert('أضف YouTube API Key في السطر 157');
    return;
  }

  const container = document.getElementById('videos');
  container.innerHTML = `
    <div class="col-span-full text-center py-24 bg-white/10 rounded-3xl backdrop-blur-xl">
      <div class="loader mx-auto mb-8"></div>
      <p class="text-white text-3xl font-bold mb-2">جاري البحث عن مواد تعليمية لـ: "${query}"</p>
      <p class="text-white/70 text-xl">الرجاء الانتظار...</p>
    </div>
  `;

  try {
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query + ' شرح درس')}&maxResults=12&type=video&videoEmbeddable=true&videoSyndicated=true&safeSearch=moderate&key=${API_KEY}`;
    
    const response = await fetch(url);
    const data = await response.json();
    
    if (data.items && data.items.length > 0) {
      displayVideos(data.items);
    } else {
      container.innerHTML = `
        <div class="col-span-full text-center py-24 bg-white/10 rounded-3xl backdrop-blur-xl">
          <div class="text-7xl mb-8">😔</div>
          <h2 class="text-white text-3xl font-bold mb-4">لا توجد نتائج مناسبة</h2>
          <p class="text-white/80 text-xl mb-8">جرب كلمات أخرى أو تأكد من الموضوعات المقترحة</p>
          <button onclick="searchVideos()" class="bg-gradient-to-r from-emerald-500 to-teal-600 text-white px-12 py-5 rounded-3xl font-bold text-xl hover:scale-105 transition-all shadow-2xl">
            بحث جديد
          </button>
        </div>
      `;
    }
  } catch (error) {
    console.error('API Error:', error);
    container.innerHTML = `
      <div class="col-span-full text-center py-24 bg-red-500/10 border-2 border-red-500/30 rounded-3xl backdrop-blur-xl">
        <div class="text-6xl mb-6">⚠️</div>
        <h2 class="text-white text-3xl font-bold mb-4">خطأ في الاتصال</h2>
        <p class="text-white/90 text-lg mb-8">${error.message}</p>
        <button onclick="searchVideos()" class="bg-red-600 hover:bg-red-700 text-white px-10 py-4 rounded-2xl font-bold text-lg shadow-xl hover:shadow-2xl transition-all">
          جرب مرة أخرى
        </button>
      </div>
    `;
  }
}

function displayVideos(videos) {
  const container = document.getElementById('videos');
  container.innerHTML = videos.map((video, index) => {
    // Safely escape double quotes
    const safeTitle = video.snippet.title.replace(/"/g, '&quot;');
    const safeChannel = video.snippet.channelTitle.replace(/"/g, '&quot;');
    
    return `
    <div class="video-card bg-white/90 backdrop-blur-xl shadow-2xl hover:shadow-3xl cursor-pointer group border border-white/20" 
         data-id="${video.id.videoId}" 
         data-title="${safeTitle}" 
         data-channel="${safeChannel}"
         onclick="playVideo(this.dataset.id, this.dataset.title, this.dataset.channel)">
      
      <div class="relative h-60 overflow-hidden rounded-t-3xl">
        <img src="${video.snippet.thumbnails.medium.url}" 
             class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 group-hover:brightness-105">
        
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 opacity-0 group-hover:opacity-100 transition-all duration-500 flex items-center justify-center">
          <div class="w-24 h-24 bg-gradient-to-r from-red-500 to-orange-500 rounded-2xl flex items-center justify-center shadow-2xl group-hover:scale-125 transition-all duration-300 transform hover:rotate-12 ml-6">
            <svg class="w-14 h-14 ml-3 text-white drop-shadow-2xl" fill="currentColor" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </div>
        </div>
      </div>
      
      <div class="p-7">
        <h3 class="font-black text-xl leading-tight line-clamp-2 mb-4 group-hover:text-blue-600 transition-colors duration-300" dir="auto">
          ${video.snippet.title}
        </h3>
        <div class="flex items-center text-sm text-gray-600">
          <div class="w-10 h-10 bg-gradient-to-r from-gray-200 to-gray-300 rounded-2xl flex items-center justify-center mr-4 shadow-md">
            <svg class="w-5 h-5 text-gray-700" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
            </svg>
          </div>
          <span class="font-semibold" dir="auto">${video.snippet.channelTitle}</span>
        </div>
      </div>
    </div>
  `}).join('');
}

function playVideo(id, title, channel) {
  currentVideoId = id;
  document.getElementById('video-title').textContent = title;
  
  const playerContainer = document.getElementById('video-player');
  
  // Inject the beautiful launch button
  playerContainer.innerHTML = `
    <div class="relative w-full aspect-video min-h-[300px] md:min-h-[450px] bg-gray-900 rounded-2xl overflow-hidden flex flex-col items-center justify-center group cursor-pointer shadow-2xl border-4 border-gray-800" onclick="openYouTube()">
      <img src="https://i.ytimg.com/vi/${id}/maxresdefault.jpg" 
           onerror="this.src='https://i.ytimg.com/vi/${id}/hqdefault.jpg'" 
           class="absolute inset-0 w-full h-full object-cover opacity-40 group-hover:opacity-60 transition-opacity duration-500">
      
      <div class="relative z-10 w-24 h-24 md:w-32 md:h-32 bg-red-600 rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(220,38,38,0.7)] group-hover:scale-110 group-hover:bg-red-500 transition-all duration-300 mb-6">
        <svg class="w-12 h-12 md:w-16 md:h-16 text-white ml-2 drop-shadow-lg" fill="currentColor" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </div>
      
      <h3 class="relative z-10 text-white text-2xl md:text-3xl font-bold px-6 text-center drop-shadow-2xl mb-3">
        اضغط هنا لتشغيل الدرس بأمان
      </h3>
      <p class="relative z-10 text-gray-200 bg-black/60 px-5 py-2 rounded-full text-sm md:text-base font-semibold backdrop-blur-sm border border-white/10">
        🚀 سيتم فتح الدرس في نافذة جديدة بدون أخطاء، يرجى تفعيل النوافذ المنبثقة
      </p>
    </div>
  `;
  
  // Show modal
  document.getElementById('modal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  document.getElementById('video-player').innerHTML = ''; 
  document.body.style.overflow = 'auto'; 
  currentVideoId = null;
}

function openYouTube() {
  if (currentVideoId) {
    // Calculate perfect center position for the popup
    const w = Math.min(1280, screen.width * 0.9);
    const h = Math.min(720, screen.height * 0.8);
    const left = (screen.width - w) / 2;
    const top = (screen.height - h) / 2;
    
    // Open clean popup window
    window.open(
      `https://www.youtube.com/watch?v=${currentVideoId}&autoplay=1`, 
      'YouTubePlayer', 
      `width=${w},height=${h},top=${top},left=${left},scrollbars=no,resizable=yes,status=no,toolbar=no,menubar=no`
    );
  }
  closeModal();
}

// Enter key support for search
document.getElementById('search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') searchVideos();
});

// Auto demo search on load
window.addEventListener('load', function() {
  document.getElementById('search-input').value = '';
  setTimeout(searchVideos, 1000);
});
</script>
</body>
</html>
